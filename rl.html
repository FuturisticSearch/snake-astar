<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake RL AI</title>
<style>
  body { margin:0; background:#111; color:#0f0; font-family:monospace; display:flex; flex-direction:column; align-items:center; }
  canvas { background:#222; display:block; margin-top:20px; }
  #stats { margin-top:10px; }
</style>
</head>
<body>
<h1>Snake RL AI (Q-learning)</h1>
<canvas id="game" width="400" height="400"></canvas>
<div id="stats"></div>

<script>
/* ===================== GAME CONFIG ===================== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const grid = 20; // size of cells
const rows = canvas.height / grid;
const cols = canvas.width / grid;
let frame = 0;

/* ===================== RL AGENT ===================== */
const actions = ['left','straight','right']; // relative to current direction
let Q = {}; // Q-table
const alpha = 0.1;   // learning rate
const gamma = 0.9;   // discount factor
let epsilon = 0.2;   // exploration rate

/* ===================== SNAKE STATE ===================== */
let snake, food, dir, score;

/* ===================== INIT GAME ===================== */
function reset() {
    snake = [{x: Math.floor(cols/2), y: Math.floor(rows/2)}];
    dir = {x:0, y:-1};
    placeFood();
    score = 0;
}

function placeFood() {
    let valid = false;
    while(!valid){
        food = {x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows)};
        valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
}

/* ===================== GAME UTILITIES ===================== */
function draw() {
    ctx.fillStyle = '#222';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Draw snake
    ctx.fillStyle = '#0f0';
    snake.forEach(s => ctx.fillRect(s.x*grid, s.y*grid, grid-1, grid-1));
    // Draw food
    ctx.fillStyle = '#f00';
    ctx.fillRect(food.x*grid, food.y*grid, grid-1, grid-1);
}

function isCollision(pos) {
    return pos.x<0 || pos.x>=cols || pos.y<0 || pos.y>=rows || snake.some(s => s.x===pos.x && s.y===pos.y);
}

/* ===================== STATE ENCODING ===================== */
function getState() {
    const head = snake[0];
    const pointLeft = {x: head.x + dir.y, y: head.y - dir.x};
    const pointRight = {x: head.x - dir.y, y: head.y + dir.x};
    const pointStraight = {x: head.x + dir.x, y: head.y + dir.y};
    // Danger flags
    const danger = [
        isCollision(pointStraight)?1:0,
        isCollision(pointLeft)?1:0,
        isCollision(pointRight)?1:0
    ];
    // Food direction relative to head
    const foodDir = [
        food.x > head.x ? 1 : (food.x < head.x ? -1 : 0),
        food.y > head.y ? 1 : (food.y < head.y ? -1 : 0)
    ];
    return danger.concat(foodDir).join(','); // state key for Q-table
}

/* ===================== ACTION HANDLING ===================== */
function turn(action) {
    let old = {...dir};
    if(action === 'left') dir = {x: old.y, y: -old.x};
    else if(action === 'right') dir = {x: -old.y, y: old.x};
    // 'straight' keeps same direction
}

/* ===================== RL Q-LEARNING ===================== */
function chooseAction(state) {
    if(Math.random() < epsilon || !Q[state]) {
        return actions[Math.floor(Math.random()*3)]; // explore
    }
    // exploit
    const q = Q[state];
    let maxVal = Math.max(...q);
    let candidates = actions.filter((a,i)=>q[i]===maxVal);
    return candidates[Math.floor(Math.random()*candidates.length)];
}

function updateQ(state, actionIdx, reward, nextState) {
    if(!Q[state]) Q[state] = [0,0,0];
    if(!Q[nextState]) Q[nextState] = [0,0,0];
    Q[state][actionIdx] = Q[state][actionIdx] + alpha * (reward + gamma * Math.max(...Q[nextState]) - Q[state][actionIdx]);
}

/* ===================== GAME LOOP ===================== */
function step() {
    frame++;
    let state = getState();
    let action = chooseAction(state);
    turn(action);

    let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    let reward = 0;
    let done = false;

    if(isCollision(head)){
        reward = -1;
        done = true;
    } else {
        snake.unshift(head);
        if(head.x === food.x && head.y === food.y){
            reward = 1;
            score++;
            placeFood();
        } else {
            snake.pop();
        }
    }

    let nextState = getState();
    updateQ(state, actions.indexOf(action), reward, nextState);

    if(done) reset();
    draw();
    document.getElementById('stats').innerText = `Score: ${score} | Frame: ${frame}`;
    requestAnimationFrame(step);
}

/* ===================== START ===================== */
reset();
step();
</script>
</body>
</html>
